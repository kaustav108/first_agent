<!DOCTYPE html>
<html>
<head>
<title>AI Assistant</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.app {
    width: 100%;
    max-width: 420px;
    height: 95vh;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(25px);
    border-radius: 25px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

.header {
    padding: 15px;
    text-align: center;
    color: white;
    font-weight: bold;
}

.orb {
    width: 110px;
    height: 110px;
    margin: 10px auto;
    border-radius: 50%;
    background: radial-gradient(circle, #00f5ff, #6a11cb);
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% {transform: scale(1);}
    50% {transform: scale(1.1);}
    100% {transform: scale(1);}
}

.chat {
    flex: 1;
    padding: 15px;
    overflow-y: auto;
}

.msg {
    padding: 12px;
    margin: 8px 0;
    border-radius: 14px;
    max-width: 75%;
    font-size: 14px;
    white-space: pre-line;
}

.user {
    background: #2575fc;
    color: white;
    margin-left: auto;
}

.bot {
    background: rgba(255,255,255,0.2);
    color: white;
}

.typing {
    opacity: 0.7;
    font-style: italic;
}

.input-box {
    display: flex;
    padding: 10px;
    gap: 8px;
}

input {
    flex: 1;
    padding: 12px;
    border-radius: 20px;
    border: none;
    outline: none;
}

button {
    padding: 12px 16px;
    border-radius: 20px;
    border: none;
    background: #00f5ff;
    cursor: pointer;
    font-weight: bold;
}

.suggestions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 8px;
}

.suggestions span {
    background: rgba(255,255,255,0.2);
    padding: 6px 10px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="app">
    <div class="header">🤖 AI Assistant</div>
    <div class="orb"></div>

    <div id="chat" class="chat"></div>

    <div class="input-box">
        <input id="msg" placeholder="Type a city (e.g. Kolkata)" />
        <button onclick="send()">➤</button>
    </div>
</div>

<script>

function addMsg(text, type) {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "msg " + type;
    div.innerText = text;

    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;

    return div;
}

function addSuggestions() {
    let chat = document.getElementById("chat");

    let div = document.createElement("div");
    div.className = "suggestions";

    let options = ["Kolkata", "Delhi", "Mumbai", "Compare"];

    options.forEach(opt => {
        let chip = document.createElement("span");
        chip.innerText = opt;
        chip.onclick = () => {
            document.getElementById("msg").value = opt;
            send();
        };
        div.appendChild(chip);
    });

    chat.appendChild(div);
}

window.onload = () => {
    addMsg("👋 Hi! Enter a city name to get weather & AQI.", "bot");
    addSuggestions();
};

async function send() {

    let input = document.getElementById("msg");
    let text = input.value.trim();
    input.value = "";

    if (!text) return;

    addMsg(text, "user");

    let typing = addMsg("AI is thinking...", "bot typing");

    try {
        let res = await fetch("/chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({message: text})
        });

        let data = await res.json();

        typing.remove();

        addMsg(data.response || "No response", "bot");

        addMsg("💬 Try another city or compare!", "bot");
        addSuggestions();

    } catch (err) {
        typing.remove();
        addMsg("⚠️ Server error", "bot");
    }
}

/* ENTER FIX */
document.getElementById("msg").addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        e.preventDefault();
        send();
    }
});

</script>

</body>
</html>
